# Full self-hosted stack: Postgres+pgvector + mem01 API
#
#   cp .env.example .env   # set OPENAI_API_KEY
#   docker compose up -d --build
#
# API:  http://localhost:8080/health
# Docs: http://localhost:8080/docs
# DB:   localhost:5433  (user/pass/db: mem01)

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mem01
      POSTGRES_PASSWORD: mem01
      POSTGRES_DB: mem01
    volumes:
      - mem01_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem01 -d mem01"]
      interval: 5s
      timeout: 5s
      retries: 12

  mem01:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://mem01:mem01@postgres:5432/mem01
      MEM01_EMBEDDING_DIM: ${MEM01_EMBEDDING_DIM:-1536}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEM01_LLM_MODEL: ${MEM01_LLM_MODEL:-gpt-5.6-sol}
      MEM01_EMBEDDING_MODEL: ${MEM01_EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  mem01_pgdata:
